name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        tool: [unsplash]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: tools/${{ matrix.tool }}/go.mod

      - name: Build
        working-directory: tools/${{ matrix.tool }}
        run: go build ./...

      - name: Test
        working-directory: tools/${{ matrix.tool }}
        run: go test ./...
